jobs:
 build:
    name: Build
    permissions:
      contents: read # to fetch the repository content
      id-token: write # for signing attestation(s) with GitHub OIDC Token
      packages: write
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
    uses: docker/github-builder/.github/workflows/build.yml@v1
    with:
      cache: true
      cache-mode: max
      context: vyos-build/docker
      meta-images: ghcr.io/techbymatt/vyos-build
      meta-tags: |
        type=raw,value=rolling
      output: image 
      platforms: linux/amd64,linux/arm64
      push: true
name: Container
on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
permissions:
  contents: read
